name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Vet
        run: go vet ./...

      - name: Run tests (with race, skip E2E)
        run: go test -count=1 -timeout 120s -race -v $(go list ./... | grep -v '/test$')

      - name: L6 Release Readiness (v0.1.1)
        run: go test -v -run TestReleaseReadiness ./internal/releasecheck/

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build multi-platform binaries
        run: |
          mkdir -p dist
          for target in "darwin/amd64" "darwin/arm64" "linux/amd64" "linux/arm64" "windows/amd64"; do
            os=$(echo $target | cut -d/ -f1)
            arch=$(echo $target | cut -d/ -f2)
            ext=""
            [ "$os" = "windows" ] && ext=".exe"

            echo "Building goalos-daemon for $os/$arch..."
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/goalos-daemon${ext} ./cmd/goalos/

            echo "Building goalos for $os/$arch..."
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/goalos${ext} ./cmd/goalos-cli/

            # Package
            if [ "$os" = "windows" ]; then
              (cd dist && zip "goalos-${os}-${arch}.zip" goalos-daemon.exe goalos.exe)
            else
              (cd dist && tar czf "goalos-${os}-${arch}.tar.gz" goalos-daemon goalos)
            fi
            echo "Packaged goalos-${os}-${arch}"
          done
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GoalOS ${{ github.ref_name }}"
          body: |
            ## Changes in ${{ github.ref_name }}

            See [开发日志](开发日志.md) for full details.

            ### Docker
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
          files: dist/goalos-*.tar.gz,dist/goalos-*.zip
          generate_release_notes: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
