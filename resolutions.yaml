# GoalOS v0.2.0 决议传播追踪 — 文档正文内容一致性检查
#
# CI 两层验证：
#   层1（元数据追溯）: 每个文件的修改记录必须引用决议编号
#   层2（正文内容一致性）: 文档正文必须满足 verify 规则——must_exist/must_not_exist
#
# verify 格式:
#   must_exist: [grep -E pattern] — 正文中必须出现此模式（否则决议未传播到正文）
#   must_not_exist: [grep -E pattern] — 正文中禁止出现此模式（旧概念未清除）
#   in_file: [filename] — 限制检查范围到指定文件（默认检查 files 列表中所有文件）
#   reason: [中文说明] — 为什么这条规则存在
#
# 设计原则:
#   1. 每条 verify 规则必须对应一个具体的决议承诺
#   2. must_not_exist 防止概念回退（旧术语复活）
#   3. must_exist 保证新概念在文档正文中可找到（非仅修改记录）
#   4. reason 字段让 CI 失败时开发者能理解"为什么必须改"

